name: Daily AI News

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install feedparser requests
      - run: python news.py
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
